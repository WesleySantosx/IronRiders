<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Contato - IronRiders</title>

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Orbitron:wght@500&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="contato.css">
</head>
<body>

  <header>
    <div class="logo">IronRiders</div>

    <nav>
      <a href="#">Home</a>
      <a href="#">Motos</a>
      <a href="#">Sobre</a>
      <a href="#">Contato</a>
    </nav>

    
  </header>

  <main>
    <section class="container">

      <h1>Fale Conosco</h1>

      <form class="form-grid">
        
        <div class="form-group">
          <label>Nome</label>
          <input type="text" placeholder="Seu nome">
        </div>

        <div class="form-group">
          <label>Email</label>
          <input type="email" placeholder="Seu email">
        </div>

        <div class="form-group full">
          <label>Mensagem</label>
          <textarea placeholder="Digite sua mensagem"></textarea>
        </div>

        <button type="submit" class="btn-enviar full">Enviar</button>

      </form>

    </section>
  </main>

  <footer>
    © 2026 IronRiders
  </footer>

</body>
</html>
